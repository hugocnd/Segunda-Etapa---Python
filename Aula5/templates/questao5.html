{% extends "index.html" %}

{% block title %} Questão 5 {% endblock %}
{% block content %} 

<h2> ALUNOS: </h2>
<ul>
{% for aluno in alunos %}
    <li>
        {{ loop.index }} - {{ aluno.nome }}
        (Nota: {{ aluno.nota }}) 
        {% if aluno.nota >= 7 %}
            <strong>Aprovado</strong>
        {% else %}
            <span style="color: red;">Reprovado</span>
        {% endif %}
    </li>
{% endfor %}
</ul>

{% endblock %}
